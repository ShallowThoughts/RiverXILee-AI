<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>RiverXILee-AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>

    <style>
        :root {
            --bg: #0a0a12;
            --panel: rgba(18, 18, 32, 0.95);
            --accent: #00d4ff;
            --accent2: #7b5eff;
            --text: #e0e0ff;
            --text-secondary: #a0a0cc;
            --user-bubble: #00d4ff;
            --ai-bubble: rgba(35, 35, 55, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 40% 20%, rgba(123, 94, 255, 0.18), transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.15), transparent 50%);
            z-index: -2;
            animation: bgShift 35s ease infinite;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0); }
            50% { transform: translate(40px, -25px); }
            100% { transform: translate(0, 0); }
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
        }

        .header {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .new-chat {
            margin: 16px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
        }
        .new-chat:hover { background: rgba(0, 212, 255, 0.25); transform: translateY(-1px); }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .history-item {
            padding: 12px 20px;
            margin: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover, .history-item.active {
            background: rgba(255,255,255,0.12);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 10, 18, 0.98);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 78%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.65;
            animation: fadeIn 0.3s ease;
        }

        .user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: #000;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px 24px;
            background: var(--panel);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .input-box {
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            resize: none;
            max-height: 180px;
            padding: 12px 16px;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        button {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.3rem;
        }

        button:hover { transform: scale(1.1); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; z-index: 100; transform: translateX(-100%); transition: 0.3s; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar" id="sidebar">
            <div class="header">RiverXILee-AI</div>
            <div class="new-chat" onclick="newConversation()">+ 新对话</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <!-- 聊天区 -->
        <div class="chat-area">
            <div class="chat-header">
                <h2 id="currentTitle">新对话</h2>
                <div>
                    模型：
                    <select id="modelSelect" style="background:#222;color:white;border:none;padding:8px 12px;border-radius:8px;font-size:0.95rem;">
                        <option value="grok-4">Grok-4</option>
                        <option value="grok-3">Grok-3</option>
                        <option value="grok-3-mini">Grok-3 Mini</option>
                    </select>
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-area">
                <div class="input-box">
                    <textarea id="userInput" rows="1" placeholder="输入消息... (Shift + Enter 换行)"></textarea>
                    <button onclick="sendMessage()" title="发送">↑</button>
                </div>
                <div style="margin-top: 10px;">
                    <button onclick="document.getElementById('fileUpload').click()" 
                            style="width:auto; border-radius:9999px; padding:8px 20px; font-size:0.95rem;">
                        📎 上传文件
                    </button>
                </div>
                <input type="file" id="fileUpload" multiple style="display:none;" onchange="handleFileUpload(event)">
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心功能 ====================
        let currentConversation = null;
        let messages = [];

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('userInput');

        // 自动调整输入框高度
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 180) + 'px';
        });

        // Enter 发送，Shift+Enter 换行
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 添加用户消息
            addMessage('user', text);
            userInput.value = '';

            // TODO: 调用 proxy.php 发送请求
            addMessage('ai', '思考中...', true);
        }

        function addMessage(role, content, isLoading = false) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = content;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function newConversation() {
            messages = [];
            messagesContainer.innerHTML = '';
            document.getElementById('currentTitle').textContent = '新对话';
        }

        function handleFileUpload(e) {
            const files = e.target.files;
            if (files.length > 0) {
                addMessage('user', `已上传 ${files.length} 个文件`);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('%cRiverXILee-AI 已优化加载成功 🚀', 'color:#00d4ff;font-weight:bold');
            newConversation();
        });
    </script>
</body>
</html>
